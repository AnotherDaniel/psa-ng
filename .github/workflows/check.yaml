# Quick checks for PRs and pushes to main — provides fast feedback on code quality.
# Heavier tasks (coverage, TSF evidence, OFT reports) are in the release workflow.
---
name: Check

on:
    push:
        branches:
            - main
    pull_request:
        paths:
            - "psa-api/**"
            - "psa-web/**"
            - "Cargo.*"
            - "docs/**"
    workflow_call:
    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-${{ github.workflow }}
    cancel-in-progress: true

env:
    RUST_TOOLCHAIN: ${{ vars.RUST_TOOLCHAIN || 'stable' }}
    RUSTFLAGS: -Dwarnings
    CARGO_TERM_COLOR: always

jobs:
    fmt:
        name: Formatting
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_TOOLCHAIN }}
                  components: rustfmt
            - name: cargo fmt --check
              run: cargo fmt --all --check

    clippy:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_TOOLCHAIN }}
                  components: clippy
            - name: cargo clippy
              run: cargo clippy --workspace --all-targets -- -W warnings -D warnings

    check:
        name: Build check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_TOOLCHAIN }}
            - name: cargo check
              run: cargo check --workspace --all-targets

    test:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_TOOLCHAIN }}
            - name: cargo test
              run: cargo test --workspace --no-fail-fast

    doc:
        name: Documentation
        runs-on: ubuntu-latest
        env:
            RUSTDOCFLAGS: -Dwarnings
        steps:
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: ${{ env.RUST_TOOLCHAIN }}
            - name: cargo doc
              run: cargo doc --workspace --no-deps

    deny:
        name: Dependency check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: EmbarkStudios/cargo-deny-action@v2
              with:
                  command: check
