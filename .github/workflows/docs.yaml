# Builds and deploys the project documentation site (OFT tracing report and
# TSF trust report) to GitHub Pages. Called by the release workflow.
---
# .github/workflows/docs.yaml
name: Report publication workflow

on:
    workflow_call:
    workflow_dispatch:

concurrency:
    group: "publish-${{ github.head_ref || github.ref }}"
    cancel-in-progress: true

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - run: pip install -e .

            - name: Retrieve HTML OFT report for publication
              uses: actions/download-artifact@v8
              with:
                  name: oft-tracing-report-html
                  path: mkdocs/oft

            - name: Retrieve TSF report for publication
              uses: actions/download-artifact@v8
              with:
                  name: trustable-report-files
                  path: mkdocs/trustable

            - name: Build site
              env:
                  VERSION: ${{ github.ref_name }}
                  REPO_URL: https://github.com/${{ github.repository }}
                  REPO_NAME: ${{ github.repository }}
                  SITE_URL: https://${{ github.repository_owner }}.github.io/${{
                      github.event.repository.name }}/
                  MAIN_PATH: /tree/main
              run: mkdocs build

            - uses: actions/upload-pages-artifact@v4
              with:
                  path: site

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
        steps:
            - uses: actions/deploy-pages@v4
