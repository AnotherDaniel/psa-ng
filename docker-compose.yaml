# [impl->req~container-deployment~1]
services:
  psa-ng:
    build: .
    container_name: psa-ng
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - psa-data:/app/data
    environment:
      - RUST_LOG=info

volumes:
  psa-data:
